<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Speech bubble editor</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; background: #1e1e1e; color: #ddd; }
  .toolbar { margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .toolbar button, .toolbar select, .toolbar input {
    background: #333; border: 1px solid #555; color: #eee; padding: 6px 10px; border-radius: 4px; cursor: pointer;
  }
  .toolbar button:hover { background: #444; }
  .toolbar label { align-self: center; font-size: 13px; }
  canvas { border: 1px solid #444; background: #111; max-width: 100%; }
  #layout { width: 100%; height: 80px; font-family: monospace; font-size: 11px;
            background: #111; color: #aaa; border: 1px solid #333; margin-top: 8px; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<div class="toolbar">
  <label>Bubble shape:</label>
  <select id="shape">
    <option value="rounded">Rounded</option>
    <option value="ellipse">Ellipse</option>
    <option value="shout">Shout</option>
    <option value="thought">Thought</option>
  </select>
  <button id="add-bubble">Add bubble</button>
  <button id="remove-selected">Delete selected</button>
  <button id="export-png">Export PNG</button>
  <button id="export-json">Export JSON</button>
  <label>Load panel:</label>
  <input type="file" id="file-input" accept="image/*">
</div>

<canvas id="c" width="1536" height="1024"></canvas>
<div class="hint">
  Click + drag bubbles; the tiny black square on the bottom-right is the tail
  target — drag it to aim the tail at a speaker. Double-click a bubble to edit
  text. Export PNG gives you the flattened image; Export JSON gives you a
  layout you can re-render server-side for reproducibility.
</div>
<textarea id="layout" readonly placeholder="Layout JSON appears here after Export JSON."></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script>
(function () {
  const canvas = new fabric.Canvas('c', { backgroundColor: '#222' });
  let nextId = 1;

  // Fit canvas to viewport width while keeping aspect ratio.
  function resizeCanvas(bgW, bgH) {
    const maxW = Math.min(window.innerWidth - 32, 1600);
    const ratio = bgW / bgH;
    const w = maxW;
    const h = maxW / ratio;
    canvas.setWidth(w);
    canvas.setHeight(h);
    canvas.setZoom(w / bgW);
    canvas.requestRenderAll();
  }

  // Accept ?bg=<dataurl> or ?bg=<url> for the initial background.
  const params = new URLSearchParams(location.search);
  const bgParam = params.get('bg');
  if (bgParam) loadBackground(bgParam);

  document.getElementById('file-input').addEventListener('change', (evt) => {
    const file = evt.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => loadBackground(e.target.result);
    reader.readAsDataURL(file);
  });

  function loadBackground(src) {
    fabric.Image.fromURL(src, (img) => {
      resizeCanvas(img.width, img.height);
      canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
        scaleX: 1, scaleY: 1, originX: 'left', originY: 'top',
      });
    }, { crossOrigin: 'anonymous' });
  }

  function makeShape(shape, x, y, w, h) {
    const common = { left: x, top: y, width: w, height: h, fill: '#fff', stroke: '#000', strokeWidth: 3, originX: 'left', originY: 'top' };
    switch (shape) {
      case 'ellipse':
        return new fabric.Ellipse({ ...common, rx: w / 2, ry: h / 2 });
      case 'shout':
        return new fabric.Polygon(shoutPoints(w, h), { ...common });
      case 'thought':
        return new fabric.Ellipse({ ...common, rx: w / 2, ry: h / 2, strokeDashArray: [8, 6] });
      case 'rounded':
      default:
        return new fabric.Rect({ ...common, rx: Math.min(w, h) * 0.25, ry: Math.min(w, h) * 0.25 });
    }
  }

  function shoutPoints(w, h) {
    const cx = w / 2, cy = h / 2;
    const spikes = 16;
    const rxOut = w / 2, ryOut = h / 2;
    const rxIn = rxOut * 0.82, ryIn = ryOut * 0.82;
    const pts = [];
    for (let i = 0; i < spikes * 2; i++) {
      const angle = (Math.PI * i) / spikes;
      const rx = i % 2 === 0 ? rxOut : rxIn;
      const ry = i % 2 === 0 ? ryOut : ryIn;
      pts.push({ x: cx + Math.cos(angle) * rx, y: cy + Math.sin(angle) * ry });
    }
    return pts;
  }

  function createBubble(shape, text) {
    const w = 260, h = 140;
    const x = 100 + Math.random() * 300;
    const y = 80 + Math.random() * 200;

    const bg = makeShape(shape, 0, 0, w, h);
    const txt = new fabric.Textbox(text || 'Type here...', {
      width: w * 0.8, left: w * 0.1, top: h * 0.25,
      fontSize: 22, textAlign: 'center', fill: '#000', fontFamily: 'sans-serif',
    });

    // Tail target handle (a small draggable marker). Position defaults below
    // the bubble; we'll render the tail dynamically.
    const tail = new fabric.Rect({
      left: w - 12, top: h + 40, width: 12, height: 12,
      fill: '#000', selectable: true, hasControls: false, hoverCursor: 'move',
    });

    const tailLine = new fabric.Polygon([], {
      fill: '#fff', stroke: '#000', strokeWidth: 3, selectable: false, evented: false,
    });

    const group = new fabric.Group([tailLine, bg, txt, tail], {
      left: x, top: y, subTargetCheck: true, hasBorders: true, hasControls: true,
    });
    group.data = { id: nextId++, shape, tailOffset: { x: 20, y: h + 40 } };

    // Update tail whenever group moves or tail marker moves (approximate).
    function updateTail() {
      const [tl, bgObj, txtObj, tailObj] = group.getObjects();
      const cx = bgObj.width / 2;
      const cy = bgObj.height / 2;
      const tx = tailObj.left + tailObj.width / 2;
      const ty = tailObj.top + tailObj.height / 2;
      const dx = tx - cx, dy = ty - cy;
      const norm = Math.hypot(dx, dy) || 1;
      const ex = cx + (dx / norm) * bgObj.width * 0.45;
      const ey = cy + (dy / norm) * bgObj.height * 0.45;
      const base = Math.max(12, Math.min(bgObj.width, bgObj.height) / 6);
      const px = -dy / norm * base / 2;
      const py = dx / norm * base / 2;
      tl.set({ points: [
        { x: ex + px, y: ey + py },
        { x: ex - px, y: ey - py },
        { x: tx, y: ty },
      ] });
      group.dirty = true;
      canvas.requestRenderAll();
    }

    group.on('modified', updateTail);
    group.on('moving', updateTail);
    updateTail();

    canvas.add(group);
    canvas.setActiveObject(group);
  }

  document.getElementById('add-bubble').addEventListener('click', () => {
    createBubble(document.getElementById('shape').value);
  });

  document.getElementById('remove-selected').addEventListener('click', () => {
    const obj = canvas.getActiveObject();
    if (obj) canvas.remove(obj);
  });

  document.getElementById('export-png').addEventListener('click', () => {
    const data = canvas.toDataURL({ format: 'png', multiplier: 1 / canvas.getZoom() });
    const a = document.createElement('a');
    a.href = data;
    a.download = 'panel_with_bubbles.png';
    a.click();
  });

  document.getElementById('export-json').addEventListener('click', () => {
    const bubbles = [];
    canvas.getObjects().forEach(obj => {
      if (!obj.data || !obj.data.shape) return;
      const [tl, bg, txt, tail] = obj.getObjects();
      bubbles.push({
        shape: obj.data.shape,
        x: Math.round(obj.left),
        y: Math.round(obj.top),
        width: Math.round(bg.width * obj.scaleX),
        height: Math.round(bg.height * obj.scaleY),
        text: txt.text,
        font_size: Math.round(txt.fontSize * obj.scaleX),
        tail: {
          x: Math.round(obj.left + (tail.left + tail.width / 2) * obj.scaleX),
          y: Math.round(obj.top + (tail.top + tail.height / 2) * obj.scaleY),
        },
      });
    });
    document.getElementById('layout').value = JSON.stringify({ bubbles }, null, 2);
  });
})();
</script>
</body>
</html>
